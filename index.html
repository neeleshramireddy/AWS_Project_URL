<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #232f3e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #37475a; }
        #result { margin-top: 20px; word-break: break-all; color: #ff9900; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <p>Paste a long URL to shorten it.</p>
        <input type="text" id="longUrl" placeholder="https://example.com/very/long/path">
        <button onclick="shortenUrl()">Shorten URL</button>
        <div id="result"></div>
    </div>

    <script>
        async function shortenUrl() {
            const longUrl = document.getElementById('longUrl').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Processing...";

            try {
                const response = await fetch('https://ghrmlpy0x2.execute-api.us-east-1.amazonaws.com/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ long_url: longUrl })
                });

                const data = await response.json();
                if (data.short_url) {
                    resDiv.innerHTML = `Short link: <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
                } else {
                    resDiv.innerText = "Error: " + JSON.stringify(data);
                }
            } catch (err) {
                resDiv.innerText = "Failed to connect to API. Check CORS settings.";
            }
        }
    </script>
</body>
</html>
